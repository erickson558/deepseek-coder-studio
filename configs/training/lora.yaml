version: "0.1"
job_name: "deepseek-coder-lora-v0-3-6"
strategy: "lora"
base_model: "deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct"
train_file: "data/processed/train.jsonl"
validation_file: "data/processed/validation.jsonl"
output_dir: "outputs/adapters"
merged_output_dir: "outputs/merged"
logs_dir: "outputs/logs"
report_to: []
max_seq_length: 2048
num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
warmup_ratio: 0.03
weight_decay: 0.01
logging_steps: 10
eval_steps: 50
save_steps: 50
save_total_limit: 2
max_grad_norm: 1.0
bf16: false
fp16: false
gradient_checkpointing: true
save_strategy: "steps"
evaluation_strategy: "steps"
load_best_model_at_end: false
merge_adapter: true
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
